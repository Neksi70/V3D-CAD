# opencascade.js Custom Build für Volme3D
# Ziel: nur die benötigten OCCT-Klassen → deutlich kleinere WASM
#
# Build-Befehl:
#   mkdir -p /home/v3da/occt-test/dist
#   docker run --rm \
#     -v /home/v3da/occt-test:/src \
#     donalffons/opencascade.js:latest \
#     /src/volme3d.custom.yml
#
# Output: dist/volme3d.js + dist/volme3d.wasm

mainBuild:
  name: volme3d.js
  bindings:
    # ── Primitive ─────────────────────────────────────────────────────────────
    - symbol: BRepPrimAPI_MakeBox
    - symbol: BRepPrimAPI_MakeSphere
    - symbol: BRepPrimAPI_MakeCylinder
    - symbol: BRepPrimAPI_MakeCone

    # ── Fillet / Chamfer ──────────────────────────────────────────────────────
    - symbol: BRepFilletAPI_LocalOperation
    - symbol: BRepFilletAPI_MakeFillet
    - symbol: BRepFilletAPI_MakeChamfer
    - symbol: ChFi3d_FilletShape

    # ── Meshing ───────────────────────────────────────────────────────────────
    - symbol: BRepMesh_DiscretRoot
    - symbol: BRepMesh_IncrementalMesh
    - symbol: Poly_Triangulation
    - symbol: Poly_Triangle

    # ── Topologie-Traversal ───────────────────────────────────────────────────
    - symbol: Standard_Transient
    - symbol: TopAbs_ShapeEnum
    - symbol: TopAbs_Orientation
    - symbol: TopExp_Explorer
    - symbol: TopLoc_Location
    - symbol: BRep_Tool
    - symbol: TopoDS
    - symbol: TopoDS_Shape
    - symbol: TopoDS_Face
    - symbol: TopoDS_Edge
    - symbol: TopoDS_Shell
    - symbol: TopoDS_Solid
    - symbol: TopoDS_Vertex

    # ── Kurven-Adapter ────────────────────────────────────────────────────────
    - symbol: BRepAdaptor_Curve

    # ── Geometrie-Grundtypen ──────────────────────────────────────────────────
    - symbol: gp_Pnt
    - symbol: gp_Vec
    - symbol: gp_Dir
    - symbol: gp_Ax1
    - symbol: gp_Ax2
    - symbol: gp_Trsf

    # ── CSG Boolean ───────────────────────────────────────────────────────────
    - symbol: BRepAlgoAPI_Cut
    - symbol: BRepAlgoAPI_Fuse
    - symbol: BRepAlgoAPI_Common

    # ── Builder ───────────────────────────────────────────────────────────────
    - symbol: BRepBuilderAPI_Command
    - symbol: BRepBuilderAPI_MakeShape
    - symbol: BRepBuilderAPI_MakeSolid
    - symbol: BRepBuilderAPI_MakeShell
    - symbol: BRepBuilderAPI_Transform
    - symbol: Message_ProgressRange

    # ── Triangulation ─────────────────────────────────────────────────────────
    - symbol: Handle_Poly_Triangulation

    # ── Export ────────────────────────────────────────────────────────────────
    - symbol: StlAPI_Writer
    - symbol: STEPControl_Writer
    - symbol: BinXCAFDrivers

  # Emscripten-Flags: Exception-Support bleibt aktiv (Build/IsDone braucht es)
  emccFlags:
    - "-flto"
    - "-fexceptions"
    - "-sDISABLE_EXCEPTION_CATCHING=0"
    - "-O3"
    - "-sEXPORT_ES6=1"
    - "-sUSE_ES6_IMPORT_META=0"
    - "-sEXPORTED_RUNTIME_METHODS=['FS']"
    - "-sINITIAL_MEMORY=64MB"
    - "-sMAXIMUM_MEMORY=512MB"
    - "-sALLOW_MEMORY_GROWTH=1"
    - "--no-entry"

additionalCppCode: |
  #include <Poly_MeshPurpose.hxx>
  int getPolyMeshPurposeNone() { return (int)Poly_MeshPurpose_NONE; }

generateTypescriptDefinitions: true
