<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>OCCT PoC — Chamfer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111827; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #status {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.75); border: 1px solid #334;
      border-radius: 8px; padding: 14px 18px;
      font-size: 13px; line-height: 2; min-width: 280px;
      pointer-events: none;
    }
    #status h3 { color: #7dd3fc; margin-bottom: 4px; font-size: 14px; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
    .inf { color: #94a3b8; }
    #info {
      position: fixed; bottom: 16px; left: 16px;
      color: #475569; font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="status">
  <h3>opencascade.js v1.1.1</h3>
  <div class="inf">Lade WASM-Modul...</div>
</div>
<div id="info">Drag: Rotieren &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; RMB: Pan</div>

<!-- Three.js r128 (script-tag kompatibel) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script type="module">
import initOpenCascade from './opencascade.wasm.js';

// ─── Three.js Setup ──────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x111827);
scene.fog = new THREE.Fog(0x111827, 300, 600);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(110, 90, 130);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(25, 25, 25);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Licht
const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(60, 100, 80);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8ab4f8, 0.3);
fill.position.set(-50, -20, -60);
scene.add(fill);

// Grid
const grid = new THREE.GridHelper(200, 20, 0x1e293b, 0x1e293b);
scene.add(grid);

// Animationsloop
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Status-Log ──────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
function log(msg, type = 'ok') {
  const d = document.createElement('div');
  d.className = type;
  d.textContent = (type === 'ok' ? '✓ ' : type === 'err' ? '✗ ' : '  ') + msg;
  statusEl.appendChild(d);
}

// ─── Geometrie-Extraktion ────────────────────────────────────────────────────
function shapeToThreeGeometry(oc, shape) {
  const mesher = new oc.BRepMesh_IncrementalMesh_2(shape, 0.3, false, 0.5, false);
  mesher.Perform();

  const positions = [];
  const indices   = [];
  let   offset    = 0;

  const faceExp = new oc.TopExp_Explorer_2(
    shape,
    oc.TopAbs_ShapeEnum.TopAbs_FACE,
    oc.TopAbs_ShapeEnum.TopAbs_SHAPE
  );

  while (faceExp.More()) {
    const face = oc.TopoDS.Face_1(faceExp.Current());
    const loc  = new oc.TopLoc_Location_1();
    const tri  = oc.BRep_Tool.Triangulation(face, loc);

    if (!tri.IsNull()) {
      const isRev  = face.Orientation_1() === oc.TopAbs_Orientation.TopAbs_REVERSED;
      const hasTrf = !loc.IsIdentity();
      const trsf   = hasTrf ? loc.Transformation() : null;
      const nb     = tri.get().NbNodes();
      const nbTri  = tri.get().NbTriangles();

      for (let i = 1; i <= nb; i++) {
        const n = tri.get().Node(i);
        if (trsf) {
          const p = new oc.gp_Pnt_3(n.X(), n.Y(), n.Z());
          p.Transform(trsf);
          positions.push(p.X(), p.Y(), p.Z());
          p.delete();
        } else {
          positions.push(n.X(), n.Y(), n.Z());
        }
      }

      for (let i = 1; i <= nbTri; i++) {
        const t = tri.get().Triangle(i);
        const a = t.Value(1) - 1, b = t.Value(2) - 1, c = t.Value(3) - 1;
        if (isRev) indices.push(offset + a, offset + c, offset + b);
        else        indices.push(offset + a, offset + b, offset + c);
      }

      offset += nb;
    }
    faceExp.Next();
  }
  faceExp.delete();
  mesher.delete();

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

// ─── OCCT Hauptlogik ─────────────────────────────────────────────────────────
initOpenCascade({ wasmPath: './opencascade.wasm.wasm' }).then(oc => {
  log('OCCT geladen');

  // 1. Box 50×50×50 mm
  const pt = new oc.gp_Pnt_3(0, 0, 0);
  const boxMaker = new oc.BRepPrimAPI_MakeBox_2(pt, 50, 50, 50);
  pt.delete();
  const boxShape = boxMaker.Shape();
  boxMaker.delete();
  log('Box erstellt (50 × 50 × 50 mm)');

  let finalShape = boxShape;

  // Hilfsfunktion: erste gerade Kante eines Shapes
  function firstLineEdge(shape) {
    const exp = new oc.TopExp_Explorer_2(
      shape, oc.TopAbs_ShapeEnum.TopAbs_EDGE, oc.TopAbs_ShapeEnum.TopAbs_SHAPE
    );
    while (exp.More()) {
      const edge = oc.TopoDS.Edge_1(exp.Current());
      try {
        const adaptor = new oc.BRepAdaptor_Curve_2(edge);
        const isLine = adaptor.GetType() === oc.GeomAbs_CurveType.GeomAbs_Line;
        adaptor.delete();
        if (isLine) { exp.delete(); return edge; }
      } catch(_) {}
      exp.Next();
    }
    exp.delete();
    return null;
  }

  // 3. Chamfer auf Original-Box (Kante 0, gerade)
  let chamferOk = false;
  try {
    const chamfer = new oc.BRepFilletAPI_MakeChamfer(boxShape);
    const edge0 = firstLineEdge(boxShape);
    if (edge0) {
      chamfer.Add_2(5.0, edge0);
      chamfer.Build();
      if (chamfer.IsDone()) {
        finalShape = chamfer.Shape();
        chamferOk  = true;
        log('Chamfer 5 mm auf Box');
      } else {
        log('Chamfer IsDone=false', 'err');
      }
    } else {
      log('Keine gerade Box-Kante', 'err');
    }
  } catch (e) {
    log('Chamfer Fehler: ' + e.message, 'err');
    console.error(e);
  }

  // 4. Fillet auf Chamfer-Ergebnis (andere gerade Kante)
  let filletOk = false;
  try {
    const fillet = new oc.BRepFilletAPI_MakeFillet(
      finalShape, oc.ChFi3d_FilletShape.ChFi3d_Rational
    );
    const edge1 = firstLineEdge(finalShape);
    if (edge1) {
      fillet.Add_2(3.0, edge1);
      fillet.Build();
      if (fillet.IsDone()) {
        finalShape = fillet.Shape();
        filletOk   = true;
        log('Fillet 3 mm auf Chamfer-Ergebnis');
      } else {
        log('Fillet IsDone=false', 'err');
      }
    } else {
      log('Keine gerade Kante für Fillet', 'err');
    }
  } catch (e) {
    log('Fillet Fehler: ' + e.message, 'err');
    console.error(e);
  }

  // 5. Triangulieren + Rendern
  try {
    const geo = shapeToThreeGeometry(oc, finalShape);
    const vCount = geo.attributes.position.count;
    log('Trianguliert (' + vCount + ' Vertices)');

    // Hauptmesh
    const mat  = new THREE.MeshStandardMaterial({
      color:     0x7090b0,
      roughness: 0.35,
      metalness: 0.55,
      side: THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow    = true;
    mesh.receiveShadow = true;
    scene.add(mesh);

    // Kanten-Overlay
    const edgesGeo = new THREE.EdgesGeometry(geo, 15);
    const edgesMat = new THREE.LineBasicMaterial({ color: 0x38bdf8, opacity: 0.5, transparent: true });
    scene.add(new THREE.LineSegments(edgesGeo, edgesMat));

    const ops = [chamferOk && 'Chamfer', filletOk && 'Fillet'].filter(Boolean).join(' + ');
    log('Mesh gerendert' + (ops ? ': ' + ops : ' (nur Box)'));
  } catch (e) {
    log('Render Fehler: ' + e.message, 'err');
    console.error(e);
  }

}).catch(err => {
  log('WASM Ladefehler: ' + err, 'err');
  console.error(err);
});
</script>
</body>
</html>
