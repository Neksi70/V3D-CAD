<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F97316">
<title>Abstimmung · Volme3D</title>
<link rel="icon" href="favicon.svg">
<style>
  :root{
    --acc:#F97316; --acc2:#7c3aed; --bg:#f4f5f9; --card:#fff; --text:#1f2430; --mid:#444b59;
    --dim:#8a91a3; --border:#e3e6ef; --red:#ef4444; --green:#059669;
    --font:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
  a{color:var(--acc);text-decoration:none}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 40px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;margin-bottom:14px}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
  .brand .sp{flex:1}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 6px 24px rgba(20,24,40,.05);padding:18px;margin-bottom:16px}
  h1{font-size:21px;font-weight:800;margin:0 0 4px;line-height:1.25}
  .desc{font-size:13.5px;color:var(--mid);line-height:1.5;margin:0 0 14px}
  .lbl{font-size:11px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 7px}
  input,textarea{width:100%;font-family:var(--font);font-size:15px;color:var(--text);background:#fbfcfe;border:1.5px solid var(--border);border-radius:11px;padding:11px 13px}
  input:focus,textarea:focus{outline:none;border-color:var(--acc)}
  textarea{resize:vertical;min-height:48px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--text);background:#fff;border:1.5px solid var(--border);border-radius:11px;padding:10px 14px;cursor:pointer;transition:all .12s;white-space:nowrap}
  .btn:hover{border-color:var(--acc);color:var(--acc)}
  .btn:active{transform:translateY(1px)}
  .btn.pri{background:linear-gradient(180deg,#fb923c,var(--acc));color:#fff;border-color:var(--acc)}
  .btn.pri:hover{filter:brightness(1.05);color:#fff}
  .btn.wa{background:#25D366;color:#fff;border-color:#25D366}
  .btn.wa:hover{filter:brightness(1.05);color:#fff}
  .btn.del{background:#fff;color:var(--red);border-color:#fecaca}
  .btn.del:hover{background:#fee2e2}
  .btn.block{width:100%;padding:13px;font-size:15px}
  .btn[disabled]{opacity:.55;pointer-events:none}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .opt-row{display:flex;gap:7px;align-items:center;margin-bottom:8px}
  .opt-row .emoji{flex:0 0 46px;text-align:center;padding:11px 0}
  .opt-row .x{flex:0 0 auto;color:var(--red);cursor:pointer;font-size:18px;padding:4px 7px;border-radius:8px;user-select:none}
  .opt-row .x:hover{background:#fee2e2}
  .toggle{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--mid);margin-top:6px;cursor:pointer;user-select:none}
  .toggle .sw{width:42px;height:24px;border-radius:12px;background:var(--border);position:relative;transition:background .15s;flex:0 0 auto}
  .toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .15s}
  .toggle.on .sw{background:var(--acc)}
  .toggle.on .sw::after{left:20px}
  /* Voting */
  .vopt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:15px 16px;margin-bottom:10px;border:2px solid var(--border);border-radius:14px;background:#fff;font-size:16px;font-weight:600;color:var(--text);cursor:pointer;transition:all .12s}
  .vopt:hover{border-color:var(--acc);background:#fff8f2}
  .vopt.sel{border-color:var(--acc);background:#fff3e9;box-shadow:0 0 0 2px rgba(249,115,22,.18)}
  .vopt .em{font-size:20px;flex:0 0 auto}
  .vopt .mk{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
  .vopt.sel .mk{background:var(--acc);border-color:var(--acc)}
  /* Results */
  .bar{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:10px;height:38px;margin:8px 0;overflow:hidden}
  .bar .fill{position:absolute;inset:0 auto 0 0;width:0;background:linear-gradient(90deg,#c4b5fd,var(--acc2));border-radius:10px 0 0 10px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .bar.lead .fill{background:linear-gradient(90deg,#6ee7b7,var(--green))}
  .bar .lab{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 13px;font-size:14px;font-weight:700}
  .bar .lab .r{color:var(--mid);font-variant-numeric:tabular-nums}
  .meta{font-size:12.5px;color:var(--dim);margin:2px 0 10px}
  .pill{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;background:#eef0f7;color:var(--mid)}
  .pill.live{background:#ecfdf5;color:var(--green)}
  .pill.closed{background:#fef2f2;color:var(--red)}
  .muted{color:var(--dim);font-size:13px}
  .center{text-align:center}
  .foot{text-align:center;font-size:12px;color:var(--dim);margin-top:20px}
  .pl-item{border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
  .pl-q{font-weight:800;font-size:15px;margin-bottom:2px}
  .hidden{display:none!important}
  .spin{display:inline-block;width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#1f2430;color:#fff;font-size:13px;font-weight:600;padding:10px 16px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:99;opacity:0;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="card center"><span class="spin"></span></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyB1TC58k0AmuU6pclev-WLr1-VGIgu98Q4",
  authDomain:        "volme3d.firebaseapp.com",
  projectId:         "volme3d",
  storageBucket:     "volme3d.firebasestorage.app",
  messagingSenderId: "287060944142",
  appId:             "1:287060944142:web:4e9175ff4f769e9310235f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const polls = db.collection('polls');
const FV = firebase.firestore.FieldValue;

const app = document.getElementById('app');
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pollLink = id => location.origin + location.pathname + '?poll=' + id;
let _toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),1900); }

const BRAND = '<div class="brand"><span class="logo">🗳</span><span>Volme3D · Abstimmung</span><span class="sp"></span><span id="brand-extra"></span></div>';

// ── Router ────────────────────────────────────────────────────────────────
const pollId = new URLSearchParams(location.search).get('poll');
if (pollId) {
  renderVote(pollId);
} else {
  auth.onAuthStateChanged(u => u ? renderDashboard(u) : renderLogin());
}

// ── Login (Admin) ─────────────────────────────────────────────────────────
function renderLogin(){
  app.innerHTML = BRAND +
    '<div class="card center">'+
    '<h1>Abstimmungen erstellen</h1>'+
    '<p class="desc">Melde dich an, um eigene Umfragen zu erstellen und per WhatsApp zu teilen — flexibler als die WhatsApp-Umfrage (Beschreibung, Emojis, Mehrfachauswahl, Live-Ergebnisse, schließen).</p>'+
    '<button class="btn pri block" onclick="login()">Mit Google anmelden</button>'+
    '</div>'+
    '<div class="foot">Volme3D · 3D-Designs im Browser</div>';
}
function login(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(e=>toast('Anmeldung fehlgeschlagen'));
}
function logout(){ auth.signOut(); }

// ── Dashboard (Admin) ─────────────────────────────────────────────────────
let _editOptCount = 0;
function renderDashboard(user){
  app.innerHTML = BRAND +
    '<div class="card" id="create-card">'+
      '<h1>Neue Abstimmung</h1>'+
      '<div class="lbl">Frage</div>'+
      '<input id="f-q" maxlength="180" placeholder="z.B. Welches Design soll ich als Nächstes machen?">'+
      '<div class="lbl">Beschreibung (optional)</div>'+
      '<textarea id="f-desc" maxlength="400" placeholder="Kontext, Details, Abstimmungs-Ende …"></textarea>'+
      '<div class="lbl">Optionen</div>'+
      '<div id="f-opts"></div>'+
      '<button class="btn" id="f-add" onclick="addOpt()">+ Option</button>'+
      '<div class="toggle" id="f-multi" onclick="this.classList.toggle(\'on\')"><span class="sw"></span><span>Mehrfachauswahl erlauben</span></div>'+
      '<button class="btn pri block" style="margin-top:16px" id="f-create" onclick="createPoll()">✓ Abstimmung erstellen</button>'+
    '</div>'+
    '<div id="share-card"></div>'+
    '<div style="display:flex;align-items:center;margin:6px 2px 10px"><div class="lbl" style="margin:0">Meine Abstimmungen</div><div style="flex:1"></div>'+
      '<button class="btn" style="padding:6px 11px;font-size:12px" onclick="logout()">Abmelden</button></div>'+
    '<div id="my-list" class="muted">…</div>'+
    '<div class="foot">Volme3D · 3D-Designs im Browser</div>';
  document.getElementById('brand-extra').textContent = (user.displayName||user.email||'').split(' ')[0]||'';
  _editOptCount=0; addOpt(); addOpt();
  loadMine(user.uid);
}
function addOpt(){
  const c=document.getElementById('f-opts');
  if(c.querySelectorAll('.opt-row').length>=10){ toast('Maximal 10 Optionen'); return; }
  _editOptCount++;
  const n=c.querySelectorAll('.opt-row').length+1;
  const row=document.createElement('div'); row.className='opt-row';
  row.innerHTML='<input class="emoji" maxlength="2" placeholder="🙂" style="flex:0 0 52px;text-align:center;padding:11px 4px">'+
                '<input class="otext" maxlength="90" placeholder="Option '+n+'">'+
                '<span class="x" title="Entfernen" onclick="this.parentNode.remove()">✕</span>';
  c.appendChild(row);
}
async function createPoll(){
  const q=document.getElementById('f-q').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const multi=document.getElementById('f-multi').classList.contains('on');
  const rows=[...document.querySelectorAll('#f-opts .opt-row')];
  const options=[]; let i=0;
  for(const r of rows){
    const label=r.querySelector('.otext').value.trim();
    const emoji=r.querySelector('.emoji').value.trim();
    if(label){ options.push({id:'o'+(i++), label, emoji}); }
  }
  if(q.length<3){ toast('Bitte eine Frage eingeben'); return; }
  if(options.length<2){ toast('Mindestens 2 Optionen'); return; }
  const u=auth.currentUser; if(!u){ toast('Bitte anmelden'); return; }
  const counts={}; options.forEach(o=>counts[o.id]=0);
  const id='p_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const doc={ question:q, description:desc, multi, closed:false, options, counts, votesTotal:0,
    createdBy:u.uid, createdByName:(u.displayName||u.email||''), createdAt:Date.now() };
  const btn=document.getElementById('f-create'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try{ await polls.doc(id).set(doc); }
  catch(e){ console.warn(e); toast('Fehlgeschlagen — Firestore-Regeln für „polls"?'); btn.disabled=false; btn.textContent='✓ Abstimmung erstellen'; return; }
  btn.disabled=false; btn.textContent='✓ Abstimmung erstellen';
  showShare(doc, id);
  // Formular leeren
  document.getElementById('f-q').value=''; document.getElementById('f-desc').value='';
  document.getElementById('f-opts').innerHTML=''; addOpt(); addOpt();
  document.getElementById('f-multi').classList.remove('on');
  loadMine(u.uid);
}
function shareMsg(q,id){ return (q?q+'\n\n':'')+'👉 Stimm ab: '+pollLink(id); }
function shareWA(q,id){ window.open('https://wa.me/?text='+encodeURIComponent(shareMsg(q,id)),'_blank'); }
function copyLink(id){ const l=pollLink(id); (navigator.clipboard?navigator.clipboard.writeText(l):Promise.reject()).then(()=>toast('Link kopiert')).catch(()=>window.prompt('Link:',l)); }
async function nativeShare(q,id){ try{ await navigator.share({title:'Abstimmung',text:q,url:pollLink(id)}); }catch(e){} }
function showShare(doc,id){
  const c=document.getElementById('share-card');
  c.innerHTML='<div class="card">'+
    '<div style="font-weight:800;color:var(--green);margin-bottom:3px">✓ Erstellt!</div>'+
    '<p class="desc" style="margin-bottom:10px">Teile den Link — wer ihn öffnet, stimmt ohne Anmeldung ab.</p>'+
    '<div class="row">'+
      '<button class="btn wa" onclick="shareWA('+jsArg(doc.question)+',\''+id+'\')">🟢 WhatsApp</button>'+
      '<button class="btn" onclick="copyLink(\''+id+'\')">🔗 Link kopieren</button>'+
      (navigator.share?'<button class="btn" onclick="nativeShare('+jsArg(doc.question)+',\''+id+'\')">Teilen…</button>':'')+
      '<button class="btn" onclick="window.open(pollLink(\''+id+'\'),\'_blank\')">📊 Ansehen</button>'+
    '</div>'+
    '<input readonly style="margin-top:10px;font-size:12px;color:var(--mid)" value="'+esc(pollLink(id))+'" onclick="this.select()">'+
    '</div>';
}
function jsArg(s){ return JSON.stringify(s||''); }

async function loadMine(uid){
  const wrap=document.getElementById('my-list');
  let docs=[];
  try{ const snap=await polls.where('createdBy','==',uid).get(); snap.forEach(d=>docs.push({id:d.id,...d.data()})); }
  catch(e){ wrap.innerHTML='<span class="muted">—</span>'; return; }
  docs.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(!docs.length){ wrap.innerHTML='<span class="muted">Noch keine Abstimmungen.</span>'; return; }
  wrap.innerHTML=docs.map(plItem).join('');
}
function barsHtml(d){
  const total=d.votesTotal||0, counts=d.counts||{};
  const max=Math.max(0,...(d.options||[]).map(o=>counts[o.id]||0));
  return (d.options||[]).map(o=>{
    const c=counts[o.id]||0, pct=total?Math.round(c/total*100):0, lead=c>0&&c===max;
    const em=o.emoji?esc(o.emoji)+' ':'';
    return '<div class="bar '+(lead?'lead':'')+'"><div class="fill" style="width:'+(total?Math.max(3,c/total*100):0)+'%"></div>'+
      '<div class="lab"><span>'+em+esc(o.label)+'</span><span class="r">'+pct+'%&nbsp;·&nbsp;'+c+'</span></div></div>';
  }).join('');
}
function plItem(d){
  const total=d.votesTotal||0;
  const pill = d.closed?'<span class="pill closed">geschlossen</span>':'<span class="pill live">offen</span>';
  return '<div class="pl-item"><div class="pl-q">'+esc(d.question)+'</div>'+
    '<div class="meta">'+pill+' &nbsp; '+total+' Stimme'+(total===1?'':'n')+(d.multi?' · Mehrfachauswahl':'')+'</div>'+
    barsHtml(d)+
    '<div class="row" style="margin-top:10px">'+
      '<button class="btn wa" onclick="shareWA('+jsArg(d.question)+',\''+d.id+'\')">🟢 WhatsApp</button>'+
      '<button class="btn" onclick="copyLink(\''+d.id+'\')">🔗 Link</button>'+
      '<button class="btn" onclick="window.open(pollLink(\''+d.id+'\'),\'_blank\')">📊</button>'+
      '<button class="btn" onclick="toggleClosed(\''+d.id+'\','+(d.closed?'false':'true')+')">'+(d.closed?'↻ Öffnen':'⏸ Schließen')+'</button>'+
      '<button class="btn del" onclick="delPoll(\''+d.id+'\')">🗑</button>'+
    '</div></div>';
}
async function toggleClosed(id,close){
  try{ await polls.doc(id).update({ closed: close }); loadMine(auth.currentUser.uid); }
  catch(e){ toast('Nicht möglich'); }
}
async function delPoll(id){
  if(!confirm('Diese Abstimmung wirklich löschen?')) return;
  try{ await polls.doc(id).delete(); toast('Gelöscht'); loadMine(auth.currentUser.uid); }
  catch(e){ toast('Löschen fehlgeschlagen'); }
}

// ── Voting (öffentlich) ───────────────────────────────────────────────────
let _voteUnsub=null, _sel=new Set();
async function renderVote(id){
  app.innerHTML = BRAND + '<div class="card center"><span class="spin"></span></div>';
  let d;
  try{ const doc=await polls.doc(id).get(); if(!doc.exists){ voteErr('Diese Abstimmung gibt es nicht (mehr).'); return; } d={id,...doc.data()}; }
  catch(e){ voteErr('Konnte nicht geladen werden.'); return; }
  if(localStorage.getItem('v3d_voted_'+id) || d.closed) showResults(id,d);
  else showBallot(id,d);
}
function voteErr(msg){ app.innerHTML = BRAND + '<div class="card"><h1>Hoppla</h1><p class="desc">'+msg+'</p><a class="btn block" href="'+location.origin+location.pathname+'">Eigene Abstimmung erstellen</a></div>'+foot(); }
function foot(){ return '<div class="foot">Erstellt mit <a href="'+location.origin+location.pathname+'">Volme3D Abstimmung</a></div>'; }
function showBallot(id,d){
  _sel=new Set();
  app.innerHTML = BRAND +
    '<div class="card">'+
      '<h1>'+esc(d.question)+'</h1>'+
      (d.description?'<p class="desc">'+esc(d.description)+'</p>':'')+
      '<p class="muted" style="margin:0 0 14px">'+(d.multi?'Mehrere Antworten möglich':'Tippe auf deine Wahl')+' · anonym</p>'+
      '<div id="ballot">'+ (d.options||[]).map(o=>
        '<div class="vopt" data-o="'+o.id+'" onclick="pick(\''+id+'\',\''+o.id+'\','+(d.multi?'true':'false')+')">'+
          (o.emoji?'<span class="em">'+esc(o.emoji)+'</span>':'')+
          '<span>'+esc(o.label)+'</span><span class="mk">'+(d.multi?'':'')+'</span></div>'
      ).join('') +'</div>'+
      (d.multi?'<button class="btn pri block" style="margin-top:6px" id="submit" onclick="submitMulti(\''+id+'\')">Abstimmen</button>':'')+
      '<div class="center" style="margin-top:12px"><a style="cursor:pointer;font-size:13px" onclick="showResults(\''+id+'\')">Nur Ergebnisse ansehen</a></div>'+
    '</div>'+ foot();
}
function pick(id, optId, multi){
  if(multi){
    const el=document.querySelector('.vopt[data-o="'+optId+'"]');
    if(_sel.has(optId)){ _sel.delete(optId); el.classList.remove('sel'); el.querySelector('.mk').textContent=''; }
    else { _sel.add(optId); el.classList.add('sel'); el.querySelector('.mk').textContent='✓'; }
  } else {
    castVote(id,[optId]);
  }
}
async function submitMulti(id){
  if(_sel.size===0){ toast('Bitte mindestens eine Option wählen'); return; }
  castVote(id,[..._sel]);
}
async function castVote(id, optIds){
  if(localStorage.getItem('v3d_voted_'+id)){ showResults(id); return; }
  const upd={ votesTotal: FV.increment(1) };
  optIds.forEach(o=> upd['counts.'+o]=FV.increment(1));
  try{ await polls.doc(id).update(upd); localStorage.setItem('v3d_voted_'+id, optIds.join(',')); }
  catch(e){ console.warn(e); toast('Stimme konnte nicht gespeichert werden'); }
  showResults(id);
}
function showResults(id, dPre){
  const my=localStorage.getItem('v3d_voted_'+id);
  if(_voteUnsub){ try{_voteUnsub();}catch(e){} _voteUnsub=null; }
  const render=d=>{
    app.innerHTML = BRAND +
      '<div class="card">'+
        '<h1>'+esc(d.question)+'</h1>'+
        (d.description?'<p class="desc">'+esc(d.description)+'</p>':'')+
        '<div class="meta">'+(d.closed?'<span class="pill closed">geschlossen</span>':'<span class="pill live">live</span>')+' &nbsp; '+(d.votesTotal||0)+' Stimme'+((d.votesTotal||0)===1?'':'n')+'</div>'+
        barsHtml(d)+
        (my?'<div style="color:var(--green);font-weight:700;font-size:13px;margin-top:8px">✓ Deine Stimme ist gezählt.</div>':'')+
        '<div class="row" style="margin-top:14px">'+
          '<button class="btn wa" onclick="shareWA('+jsArg(d.question)+',\''+id+'\')">🟢 Teilen</button>'+
          '<button class="btn" onclick="copyLink(\''+id+'\')">🔗 Link</button>'+
        '</div>'+
      '</div>'+ foot();
  };
  if(dPre) render(dPre);
  _voteUnsub = polls.doc(id).onSnapshot(doc=>{ if(doc.exists) render({id,...doc.data()}); }, ()=>{});
}
</script>
</body>
</html>
